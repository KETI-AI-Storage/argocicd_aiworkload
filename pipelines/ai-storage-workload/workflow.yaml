apiVersion: argoproj.io/v1alpha1
kind: Workflow
metadata:
  name: ai-storage-workload-pipeline
  namespace: kubeflow-user-example-com
  labels:
    app.kubernetes.io/name: ai-storage-workload-pipeline
spec:
  entrypoint: ai-storage-workload
  serviceAccountName: default-editor
  volumes:
    - name: ai-storage
      persistentVolumeClaim:
        claimName: ai-storage-shared-pvc
  templates:
    - name: ai-storage-workload
      dag:
        tasks:
          - name: dataset
            template: dataset
          - name: preprocessing
            template: preprocessing
            dependencies: [dataset]
          - name: training
            template: training
            dependencies: [preprocessing]
          - name: inference
            template: inference
            dependencies: [training]
          - name: small-io
            template: small-io
            dependencies: [dataset]
          - name: large-io
            template: large-io
            dependencies: [dataset]
          - name: checkpoint
            template: checkpoint
            dependencies: [preprocessing]
          - name: cache-read
            template: cache-read
            dependencies: [preprocessing]
          - name: archive
            template: archive
            dependencies: [inference]

    - name: dataset
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            pip install --no-cache-dir datasets pillow >/tmp/pip.log 2>&1
            python - <<'PY'
            import json
            import os
            from pathlib import Path
            from datasets import load_dataset

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path("N/A") if input_path == "none" else Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            ds = load_dataset("uoft-cs/cifar10", split="train[:3]")
            saved = []
            for idx, row in enumerate(ds):
                file_name = f"cifar10_sample_{idx}.png"
                out_file = output_abs / file_name
                row["img"].save(out_file)
                saved.append(file_name)

            manifest = output_abs / "dataset_manifest.json"
            manifest.write_text(json.dumps({"files": saved}, ensure_ascii=False, indent=2))
            size = manifest.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={manifest.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: dataset
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: none
          - name: OUTPUT_PATH
            value: /raw
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: preprocessing
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            pip install --no-cache-dir transformers pillow numpy >/tmp/pip.log 2>&1
            python - <<'PY'
            import json
            import os
            from pathlib import Path
            import numpy as np
            from PIL import Image
            from transformers import ViTImageProcessor

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            processor = ViTImageProcessor(size={"height": 32, "width": 32})
            images = sorted(input_abs.glob("*.png"))
            if not images:
                seed = Image.new("RGB", (32, 32), color=(127, 127, 127))
                seed_path = input_abs / "seed.png"
                input_abs.mkdir(parents=True, exist_ok=True)
                seed.save(seed_path)
                images = [seed_path]

            image = Image.open(images[0]).convert("RGB")
            data = processor(images=image, return_tensors="np")
            out_file = output_abs / "vit_preprocessed_pixel_values.npy"
            np.save(out_file, data["pixel_values"])

            summary = output_abs / "preprocess_summary.json"
            summary.write_text(json.dumps({"source_image": images[0].name}, ensure_ascii=False, indent=2))
            size = out_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={out_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: preprocessing
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /raw
          - name: OUTPUT_PATH
            value: /preprocessed
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: training
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            pip install --no-cache-dir transformers torch numpy >/tmp/pip.log 2>&1
            python - <<'PY'
            import json
            import os
            from pathlib import Path
            import numpy as np
            import torch
            from transformers import ViTConfig, ViTForImageClassification

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            data_path = input_abs / "vit_preprocessed_pixel_values.npy"
            if data_path.exists():
                x = torch.from_numpy(np.load(data_path)).float()
            else:
                x = torch.randn(1, 3, 32, 32)

            config = ViTConfig(
                image_size=32,
                patch_size=16,
                hidden_size=64,
                num_hidden_layers=2,
                num_attention_heads=4,
                intermediate_size=128,
                num_labels=10,
            )
            model = ViTForImageClassification(config)
            model.train()
            y = torch.tensor([1], dtype=torch.long)
            out = model(pixel_values=x, labels=y)
            out.loss.backward()

            model.save_pretrained(output_abs)
            summary = output_abs / "training_summary.json"
            summary.write_text(
                json.dumps(
                    {"model": "ViTForImageClassification", "loss": float(out.loss.detach().cpu().item())},
                    ensure_ascii=False,
                    indent=2,
                )
            )
            size = summary.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={summary.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: training
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /preprocessed
          - name: OUTPUT_PATH
            value: /training/models
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: inference
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            pip install --no-cache-dir transformers torch pillow >/tmp/pip.log 2>&1
            python - <<'PY'
            import json
            import os
            from pathlib import Path
            import torch
            from PIL import Image
            from transformers import ViTConfig, ViTForImageClassification, ViTImageProcessor

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            if (input_abs / "config.json").exists():
                model = ViTForImageClassification.from_pretrained(input_abs)
            else:
                config = ViTConfig(
                    image_size=32,
                    patch_size=16,
                    hidden_size=64,
                    num_hidden_layers=2,
                    num_attention_heads=4,
                    intermediate_size=128,
                    num_labels=10,
                )
                model = ViTForImageClassification(config)

            processor = ViTImageProcessor(size={"height": 32, "width": 32})
            image = Image.new("RGB", (32, 32), color=(100, 120, 130))
            inputs = processor(images=image, return_tensors="pt")

            model.eval()
            with torch.no_grad():
                logits = model(**inputs).logits
                pred = int(torch.argmax(logits, dim=-1).item())

            result_file = output_abs / "inference_result.json"
            result_file.write_text(
                json.dumps({"model": "ViTForImageClassification", "predicted_class": pred}, ensure_ascii=False, indent=2)
            )
            size = result_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={result_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: inference
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /training/models
          - name: OUTPUT_PATH
            value: /inference/results
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: small-io
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            python - <<'PY'
            import os
            import json
            from pathlib import Path

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            input_abs.mkdir(parents=True, exist_ok=True)
            output_abs.mkdir(parents=True, exist_ok=True)

            raw_files = sorted(input_abs.glob("*"))
            if not raw_files:
                seed = input_abs / "cifar10_seed.bin"
                seed.write_bytes(os.urandom(4096))
                raw_files = [seed]

            copied = []
            for idx in range(10):
                src = raw_files[idx % len(raw_files)]
                dst = output_abs / f"small_io_copy_{idx}.bin"
                dst.write_bytes(src.read_bytes()[:1024])
                copied.append(dst.name)

            result_file = output_abs / "small_io_result.json"
            result_file.write_text(json.dumps({"source_type": "CIFAR-10 small file read/write", "files": copied}, ensure_ascii=False, indent=2))
            size = result_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={result_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: small-io
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /raw
          - name: OUTPUT_PATH
            value: /io/small
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: large-io
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            python - <<'PY'
            import hashlib
            import os
            from pathlib import Path

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            input_abs.mkdir(parents=True, exist_ok=True)
            output_abs.mkdir(parents=True, exist_ok=True)

            source = input_abs / "llava_video_sample.raw"
            if not source.exists():
                source.write_bytes(os.urandom(16 * 1024 * 1024))

            data = source.read_bytes()
            digest = hashlib.sha256(data).hexdigest()
            out_file = output_abs / "llava_video_read_report.txt"
            out_file.write_text(f"bytes={len(data)}\nsha256={digest}\n")
            size = out_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={out_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: large-io
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /raw
          - name: OUTPUT_PATH
            value: /io/large
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: checkpoint
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            pip install --no-cache-dir transformers torch >/tmp/pip.log 2>&1
            python - <<'PY'
            import os
            import json
            from pathlib import Path
            import torch
            from transformers import ViTConfig, ViTForImageClassification

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            config = ViTConfig(
                image_size=32,
                patch_size=16,
                hidden_size=64,
                num_hidden_layers=2,
                num_attention_heads=4,
                intermediate_size=128,
                num_labels=10,
            )
            model = ViTForImageClassification(config)

            ckpt_file = output_abs / "vit_checkpoint.pt"
            torch.save(model.state_dict(), ckpt_file)
            loaded = torch.load(ckpt_file, map_location="cpu")

            result_file = output_abs / "checkpoint_result.json"
            result_file.write_text(json.dumps({"loaded_tensors": len(loaded)}, ensure_ascii=False, indent=2))
            size = ckpt_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={ckpt_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: checkpoint
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /preprocessed
          - name: OUTPUT_PATH
            value: /training/checkpoints
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: cache-read
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            pip install --no-cache-dir numpy >/tmp/pip.log 2>&1
            python - <<'PY'
            import os
            import json
            from pathlib import Path
            import numpy as np

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            cache_file = input_abs / "vit_preprocessed_pixel_values.npy"
            if cache_file.exists():
                arr = np.load(cache_file)
                read_shape = list(arr.shape)
            else:
                read_shape = [0]

            result_file = output_abs / "cache_read_result.json"
            result_file.write_text(
                json.dumps({"cache_source": "CIFAR-10 preprocessed cache", "shape": read_shape}, ensure_ascii=False, indent=2)
            )
            size = result_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={result_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: cache-read
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /preprocessed
          - name: OUTPUT_PATH
            value: /cache-read/result
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage

    - name: archive
      container:
        image: python:3.11-slim
        command:
          - /bin/bash
          - -lc
          - |
            set -euo pipefail
            python - <<'PY'
            import os
            import tarfile
            from pathlib import Path

            workload = os.environ["WORKLOAD_NAME"]
            storage_root = os.environ["STORAGE_ROOT"]
            input_path = os.environ["INPUT_PATH"]
            output_path = os.environ["OUTPUT_PATH"]

            input_abs = Path(storage_root + input_path)
            output_abs = Path(storage_root + output_path)
            output_abs.mkdir(parents=True, exist_ok=True)

            src = input_abs / "inference_result.json"
            if not src.exists():
                input_abs.mkdir(parents=True, exist_ok=True)
                src.write_text('{"status":"placeholder"}')

            archive_file = output_abs / "cifar10_inference_archive.tar.gz"
            with tarfile.open(archive_file, "w:gz") as tar:
                tar.add(src, arcname=src.name)
            size = archive_file.stat().st_size

            print(f"workload_name={workload}")
            print(f"input_path={input_path} ({input_abs})")
            print(f"output_path={output_path} ({output_abs})")
            print(f"generated_file={archive_file.name}")
            print(f"file_size_bytes={size}")
            PY
        env:
          - name: WORKLOAD_NAME
            value: archive
          - name: STORAGE_ROOT
            value: /mnt/ai-storage/runs/{{workflow.name}}
          - name: INPUT_PATH
            value: /inference/results
          - name: OUTPUT_PATH
            value: /archive
        volumeMounts:
          - name: ai-storage
            mountPath: /mnt/ai-storage
