###############################################################################
# [조합 G] Argo CD Application - ETRI 옵티머스 풀 통합 파이프라인 배포
#
# Git 저장소의 pipelines/ 디렉토리를 감시하여
# optimus-full-integration.yaml 변경 시 자동 배포
#
# 배포 흐름:
#   Git Push → Argo CD 감지 → Workflow YAML 배포 → K8s 클러스터 적용
###############################################################################
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: keti-optimus-pipeline
  namespace: argocd
  labels:
    project: keti-ai-storage
    component: optimus-integration
    partner: etri
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/KETI-AI-Storage/argocicd_aiworload.git
    targetRevision: main
    path: pipelines

  destination:
    server: https://kubernetes.default.svc
    namespace: kubeflow-user-example-com

  syncPolicy:
    automated:
      prune: true         # Git에서 삭제되면 클러스터에서도 삭제
      selfHeal: true      # 수동 변경 시 자동 복원
    syncOptions:
    - CreateNamespace=false
    - Replace=true        # Workflow는 immutable이라 교체 필요

    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
